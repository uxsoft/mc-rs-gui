name: Release

on:
  workflow_dispatch:
    inputs:
      release_body:
        description: "Release notes body (markdown). If empty, auto-generated from commits."
        required: false
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: mc-rs

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      changelog: ${{ steps.changelog.outputs.changelog }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          VERSION="0.1.${{ github.run_number }}"
          TAG="v${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_BODY: ${{ inputs.release_body }}
        run: |
          # Use provided release body if available
          if [ -n "$INPUT_BODY" ]; then
            {
              echo "changelog<<CHANGELOG_EOF"
              echo "$INPUT_BODY"
              echo "CHANGELOG_EOF"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Otherwise auto-generate from git history
          # Find the previous release tag, if any
          PREV_TAG=$(git tag --sort=-v:refname | head -n1 || true)

          if [ -z "$PREV_TAG" ]; then
            echo "No previous tag found, using full history"
            RANGE="HEAD"
          else
            echo "Previous tag: $PREV_TAG"
            RANGE="${PREV_TAG}..HEAD"
          fi

          # Collect commits since last release
          COMMITS=$(git log "$RANGE" --pretty=format:"- %s (%h)" --no-merges 2>/dev/null || git log --pretty=format:"- %s (%h)" --no-merges)

          # Collect merged PRs since last release
          if [ -z "$PREV_TAG" ]; then
            PRS=$(gh pr list --state merged --limit 50 --json number,title \
              --jq '.[] | "- #\(.number) \(.title)"' 2>/dev/null || true)
          else
            SINCE=$(git log -1 --format=%aI "$PREV_TAG" 2>/dev/null || true)
            if [ -n "$SINCE" ]; then
              PRS=$(gh pr list --state merged --limit 50 --search "merged:>=$SINCE" --json number,title \
                --jq '.[] | "- #\(.number) \(.title)"' 2>/dev/null || true)
            else
              PRS=""
            fi
          fi

          # Build changelog body
          {
            echo "changelog<<CHANGELOG_EOF"
            echo "## What's Changed"
            echo ""
            if [ -n "$PRS" ]; then
              echo "### Pull Requests"
              echo "$PRS"
              echo ""
            fi
            echo "### Commits"
            echo "$COMMITS"
            echo ""
            echo "**Full diff**: https://github.com/${{ github.repository }}/compare/${PREV_TAG:-$(git rev-list --max-parents=0 HEAD | head -1)}..v0.1.${{ github.run_number }}"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            artifact: mc-rs-linux-x64
            ext: ""
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            artifact: mc-rs-linux-arm64
            ext: ""
          - target: aarch64-apple-darwin
            runner: macos-latest
            artifact: mc-rs-macos-arm64
            ext: ""
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            artifact: mc-rs-windows-x64
            ext: ".exe"
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry and build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: release-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: release-${{ matrix.target }}-

      - name: Install system dependencies (Linux x64)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwayland-dev libxkbcommon-dev libvulkan-dev

      - name: Install system dependencies (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwayland-dev libxkbcommon-dev libvulkan-dev

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Run tests
        run: cargo test --release --target ${{ matrix.target }}

      - name: Package artifact (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p staging
          cp "target/${{ matrix.target }}/release/${BINARY_NAME}${{ matrix.ext }}" staging/
          cd staging
          tar czf "../${{ matrix.artifact }}.tar.gz" *

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path staging
          Copy-Item "target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}${{ matrix.ext }}" staging/
          Compress-Archive -Path staging/* -DestinationPath "${{ matrix.artifact }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.*
          retention-days: 1

  release:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | head -20

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Collect all packaged files
          FILES=$(find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" \))

          gh release create "${{ needs.prepare.outputs.tag }}" \
            --title "mc-rs ${{ needs.prepare.outputs.version }}" \
            --notes "${{ needs.prepare.outputs.changelog }}" \
            --target "${{ github.sha }}" \
            $FILES
