name: Release

on:
  workflow_dispatch:
    inputs:
      release_body:
        description: "Release notes body (markdown)"
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: mc-rs

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            artifact: mc-rs-linux-x64
            ext: ""
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            artifact: mc-rs-linux-arm64
            ext: ""
          - target: aarch64-apple-darwin
            runner: macos-latest
            artifact: mc-rs-macos-arm64
            ext: ""
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            artifact: mc-rs-windows-x64
            ext: ".exe"
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry and build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: release-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: release-${{ matrix.target }}-

      - name: Install system dependencies (Linux x64)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwayland-dev libxkbcommon-dev libvulkan-dev

      - name: Install system dependencies (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwayland-dev libxkbcommon-dev libvulkan-dev

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Run tests
        run: cargo test --release --target ${{ matrix.target }}

      - name: Package artifact (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p staging
          cp "target/${{ matrix.target }}/release/${BINARY_NAME}${{ matrix.ext }}" staging/
          cd staging
          tar czf "../${{ matrix.artifact }}.tar.gz" *

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path staging
          Copy-Item "target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}${{ matrix.ext }}" staging/
          Compress-Archive -Path staging/* -DestinationPath "${{ matrix.artifact }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.*
          retention-days: 1

  release:
    needs: [build]
    runs-on: ubuntu-latest
    env:
      VERSION: "0.1.${{ github.run_number }}"
      TAG: "v0.1.${{ github.run_number }}"
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | head -20

      - name: Write release notes
        env:
          RELEASE_BODY: ${{ inputs.release_body }}
        run: printf '%s\n' "$RELEASE_BODY" > release_notes.md

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          FILES=$(find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" \))

          gh release create "$TAG" \
            --title "mc-rs $VERSION" \
            --notes-file release_notes.md \
            --target "${{ github.sha }}" \
            $FILES
